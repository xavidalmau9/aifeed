<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AIFeed.run — Loading Breakthrough...</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bg: #09081a; --purple2: #a855f7; --orange: #f97316; --white: #f0eeff; }
        body { background: var(--bg); color: var(--white); font-family: 'Inter', sans-serif; }
        .article-body p { margin-bottom: 1.5rem; line-height: 1.8; font-size: 1.15rem; color: #7b78a8; }
        .article-body strong { color: var(--purple2); }
        .syne { font-family: 'Syne', sans-serif; }
    </style>
</head>
<body class="antialiased min-h-screen">
    <nav class="p-6 border-b border-white/5 backdrop-blur-xl sticky top-0 z-50 bg-[#09081a]/90">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <a href="index.html" class="syne text-2xl font-extrabold tracking-tighter">
                <span style="color:var(--purple2)">ai</span><span style="color:var(--orange)">feed</span><span>.run</span>
            </a>
            <a href="index.html" class="text-sm text-slate-500 hover:text-white transition uppercase font-bold tracking-widest">← Feed</a>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto px-6 py-16">
        <div id="loader" class="text-center py-20 text-slate-500 syne font-bold animate-pulse">CONNECTING TO AIFEED ENGINE...</div>
        
        <article id="article-content" class="hidden">
            <div id="cat" class="inline-block px-3 py-1 rounded bg-purple-500/10 border border-purple-500/30 text-purple-400 text-[10px] font-bold uppercase tracking-widest mb-6"></div>
            <h1 id="title" class="syne text-4xl md:text-6xl font-extrabold mb-8 leading-tight tracking-tighter"></h1>
            
            <img id="hero-img" class="w-full aspect-[4/5] object-cover rounded-2xl mb-12 shadow-2xl border border-white/5" src="" alt="">
            
            <div id="body-text" class="article-body"></div>

            <div class="mt-16 pt-10 border-t border-white/10 text-center">
                <a id="src-btn" href="#" target="_blank" class="syne inline-block bg-gradient-to-r from-orange-500 to-purple-600 text-white px-10 py-4 rounded-full font-bold uppercase tracking-widest hover:opacity-90 transition transform hover:scale-105">View Original Source</a>
            </div>
        </article>
    </main>

    <script>
        async function load() {
            const slug = new URLSearchParams(window.location.search).get('slug');
            try {
                // Fetch the JSON index file pushed by n8n
                const res = await fetch('_posts/posts-index.json');
                const posts = await res.json();
                const post = posts.find(p => p.slug === slug);

                if (post) {
                    document.getElementById('loader').classList.add('hidden');
                    document.getElementById('article-content').classList.remove('hidden');
                    
                    document.title = post.headline + " | AIFeed.run";
                    document.getElementById('title').textContent = post.headline;
                    document.getElementById('cat').textContent = post.category;
                    document.getElementById('hero-img').src = post.imageUrl || 'https://images.pexels.com/photos/373543/pexels-photo-373543.jpeg';
                    document.getElementById('body-text').innerHTML = post.body;
                    document.getElementById('src-btn').href = post.sourceUrl || '#';
                } else {
                    document.getElementById('loader').innerText = "STORY NOT FOUND";
                }
            } catch (e) {
                document.getElementById('loader').innerText = "CONNECTION ERROR";
            }
        }
        load();
    </script>
</body>
</html>
