<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIFeed.run | Loading News...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0f1a; color: #cbd5e1; font-family: sans-serif; }
        .content-area p { margin-bottom: 1.25rem; line-height: 1.8; font-size: 1.1rem; }
        .content-area strong { color: #38bdf8; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-3xl mx-auto">
        <div class="flex justify-between items-center mb-12">
            <a href="index.html" class="text-2xl font-black text-orange-500">aifeed.run</a>
            <a href="index.html" class="text-sm text-slate-500 hover:text-white">← Home</a>
        </div>

        <div id="loader" class="text-center py-20 text-slate-600 font-mono">ESTABLISHING CONNECTION TO FEED...</div>

        <div id="main-content" class="hidden">
            <h1 id="headline" class="text-4xl md:text-5xl font-extrabold text-white mb-6 leading-tight"></h1>
            <div id="meta" class="text-xs uppercase tracking-widest text-sky-500 font-bold mb-8"></div>
            
            <img id="post-image" class="w-full h-80 object-cover rounded-2xl mb-10 shadow-2xl border border-slate-800" src="" alt="">
            
            <div id="post-body" class="content-area"></div>
        </div>
    </div>

    <script>
        async function fetchPost() {
            const slug = new URLSearchParams(window.location.search).get('slug');
            const loader = document.getElementById('loader');
            const content = document.getElementById('main-content');

            try {
                // FORCE FETCH FROM DIRECT RAW SOURCE
                const res = await fetch('https://raw.githubusercontent.com/xavidalmau9/aifeed/main/_posts/posts-index.json');
                const posts = await res.json();
                const post = posts.find(p => p.slug === slug);

                if (post) {
                    loader.style.display = 'none';
                    content.style.display = 'block';
                    
                    document.title = post.headline;
                    document.getElementById('headline').innerText = post.headline;
                    document.getElementById('meta').innerText = `${post.category} | ${new Date(post.publishedAt).toLocaleDateString()}`;
                    document.getElementById('post-image').src = post.imageUrl;
                    document.getElementById('post-body').innerHTML = post.body;
                } else {
                    loader.innerText = "ERROR: STORY NOT FOUND IN DATABASE";
                }
            } catch (err) {
                loader.innerText = "FATAL: COULD NOT SYNC WITH GITHUB REPO";
            }
        }
        fetchPost();
    </script>
</body>
</html>
