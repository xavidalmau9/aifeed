<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIFeed.run | Loading Story...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0f1a; color: #e2e8f0; font-family: ui-sans-serif, system-ui, sans-serif; }
        .article-content p { margin-bottom: 1.5rem; line-height: 1.8; font-size: 1.15rem; color: #cbd5e1; }
        .article-content strong { color: #38bdf8; font-weight: 600; }
    </style>
</head>
<body class="antialiased">
    <nav class="p-6 border-b border-slate-800/50">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <a href="index.html" class="text-xl font-bold bg-gradient-to-r from-orange-500 to-red-500 bg-clip-text text-transparent">aifeed.run</a>
            <a href="index.html" class="text-sm text-slate-400 hover:text-white transition">← Back to Feed</a>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto px-6 py-12">
        <div id="loader" class="text-center py-20 text-slate-500">Scanning AIFeed Index...</div>
        
        <article id="article-container" class="hidden">
            <div id="category" class="inline-block px-3 py-1 rounded-full bg-slate-800 text-sky-400 text-xs font-bold uppercase tracking-widest mb-6"></div>
            <h1 id="headline" class="text-4xl md:text-5xl font-extrabold mb-6 leading-tight text-white"></h1>
            
            <div class="flex items-center gap-3 text-slate-400 text-sm mb-10 pb-10 border-b border-slate-800">
                <span id="date"></span>
            </div>

            <img id="main-image" class="w-full aspect-video object-cover rounded-2xl mb-12 shadow-2xl border border-slate-800" src="" alt="News Image">
            
            <div id="article-body" class="article-content"></div>

            <div class="mt-16 pt-8 border-t border-slate-800 text-center">
                <a id="source-link" href="#" target="_blank" class="inline-block bg-white text-black px-8 py-3 rounded-full font-bold hover:bg-slate-200 transition">Read Original Source</a>
            </div>
        </article>
    </main>

    <script>
        async function init() {
            const slug = new URLSearchParams(window.location.search).get('slug');
            if (!slug) { window.location.href = 'index.html'; return; }

            try {
                // We try to find the index file where n8n saves it
                const response = await fetch('./_posts/posts-index.json');
                const posts = await response.json();
                const post = posts.find(p => p.slug === slug);

                if (post) {
                    document.getElementById('loader').classList.add('hidden');
                    document.getElementById('article-container').classList.remove('hidden');
                    
                    document.title = post.headline + " | AIFeed.run";
                    document.getElementById('headline').textContent = post.headline;
                    document.getElementById('category').textContent = post.category || 'News';
                    document.getElementById('date').textContent = new Date(post.publishedAt).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
                    document.getElementById('main-image').src = post.imageUrl;
                    document.getElementById('article-body').innerHTML = post.body;
                    
                    if (post.sourceUrl) {
                        document.getElementById('source-link').href = post.sourceUrl;
                    } else {
                        document.getElementById('source-link').style.display = 'none';
                    }
                } else {
                    document.getElementById('loader').innerHTML = "<h1>Story Not Found</h1><p>We couldn't find that specific article in our feed.</p>";
                }
            } catch (err) {
                document.getElementById('loader').innerHTML = "<h1>Connection Error</h1><p>Could not reach the AIFeed database.</p>";
            }
        }
        init();
    </script>
</body>
</html>
