<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIFeed.run | News</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: sans-serif; }
        .article-body p { margin-bottom: 1.5rem; line-height: 1.75; font-size: 1.125rem; }
        .article-body strong { color: #38bdf8; }
    </style>
</head>
<body class="p-6 md:p-12">
    <div id="content" class="max-w-3xl mx-auto">
        <div class="mb-8">
            <a href="index.html" class="text-sky-400 hover:text-sky-300 font-medium">← Back to Feed</a>
        </div>

        <div id="article-loader">
            <h1 id="headline" class="text-4xl md:text-5xl font-bold mb-4 leading-tight">Loading...</h1>
            <div id="meta" class="text-slate-400 mb-8 flex gap-4 uppercase text-sm tracking-widest"></div>
            
            <img id="image" class="w-full h-auto rounded-2xl mb-8 shadow-2xl border border-slate-800" src="" alt="">
            
            <div id="body" class="article-body text-slate-300"></div>
            
            <hr class="border-slate-800 my-12">
            <div id="source" class="text-center"></div>
        </div>
    </div>

    <script>
        async function loadPost() {
            const params = new URLSearchParams(window.location.search);
            const slug = params.get('slug');
            
            try {
                // Fetch your n8n-generated index
                // Note: Ensure the path matches where n8n saves the file
                const response = await fetch('./_posts/posts-index.json');
                const posts = await response.json();
                
                // Find the specific post by slug
                const post = posts.find(p => p.slug === slug);

                if (post) {
                    document.title = post.headline + " | AIFeed.run";
                    document.getElementById('headline').innerText = post.headline;
                    document.getElementById('meta').innerText = `${post.category} • ${new Date(post.publishedAt).toLocaleDateString()}`;
                    document.getElementById('image').src = post.imageUrl;
                    document.getElementById('body').innerHTML = post.body;
                    
                    if (post.sourceUrl) {
                        document.getElementById('source').innerHTML = `<a href="${post.sourceUrl}" target="_blank" class="bg-slate-800 px-6 py-3 rounded-full hover:bg-slate-700 transition">Read Original Source</a>`;
                    }
                } else {
                    document.getElementById('headline').innerText = "Post Not Found";
                }
            } catch (e) {
                console.error("Error loading post:", e);
                document.getElementById('headline').innerText = "Error Loading Feed";
            }
        }
        loadPost();
    </script>
</body>
</html>
